<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#f8f9fa"/>
  
  <!-- Floating objects -->
  <g id="floating-object-1" opacity="0.3">
    <circle cx="50" cy="80" r="30" fill="#667eea"/>
    <path d="M 30 60 Q 50 40 70 60" stroke="#667eea" stroke-width="2" fill="none"/>
  </g>
  
  <g id="floating-object-2" opacity="0.2">
    <rect x="300" y="120" width="50" height="50" fill="#764ba2" transform="rotate(45 325 145)"/>
  </g>
  
  <!-- Main 404 text illustration -->
  <g id="page-not-found">
    <!-- First zero (broken) -->
    <circle cx="80" cy="150" r="40" fill="none" stroke="#667eea" stroke-width="4" stroke-dasharray="50,30"/>
    <circle cx="80" cy="150" r="35" fill="none" stroke="#667eea" stroke-width="2" opacity="0.3"/>
    
    <!-- Four -->
    <path d="M 140 110 L 140 190 M 140 130 L 180 190" stroke="#764ba2" stroke-width="4" fill="none" stroke-linecap="round"/>
    <line x1="140" y1="160" x2="180" y2="160" stroke="#764ba2" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Second zero (intact) -->
    <circle cx="240" cy="150" r="40" fill="none" stroke="#764ba2" stroke-width="4"/>
    <circle cx="240" cy="150" r="35" fill="none" stroke="#764ba2" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Question mark elements floating -->
  <g id="question-marks">
    <text x="120" y="280" font-size="40" font-weight="bold" fill="#667eea" opacity="0.4" transform="rotate(-15 140 280)">?</text>
    <text x="280" y="270" font-size="32" font-weight="bold" fill="#764ba2" opacity="0.3" transform="rotate(20 296 286)">?</text>
  </g>
  
  <!-- Search icon -->
  <g id="search-icon">
    <circle cx="320" cy="300" r="20" fill="none" stroke="#667eea" stroke-width="3"/>
    <line x1="335" y1="315" x2="350" y2="330" stroke="#667eea" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Animated particles -->
  <g id="particles" opacity="0.6">
    <circle cx="100" cy="250" r="3" fill="#667eea"/>
    <circle cx="200" cy="320" r="2" fill="#764ba2"/>
    <circle cx="320" cy="100" r="2.5" fill="#667eea"/>
    <circle cx="150" cy="350" r="2" fill="#764ba2"/>
  </g>
  
  <!-- Decorative line -->
  <path d="M 50 350 Q 200 340 350 350" stroke="#667eea" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="5,5"/>
</svg>
