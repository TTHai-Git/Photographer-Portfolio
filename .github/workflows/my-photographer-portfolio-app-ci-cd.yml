name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "my-photographer-portfolio-app/**"
      - ".github/workflows/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_CLIENT: ${{ secrets.DOCKERHUB_USERNAME }}/my-photographer-portfolio-app-client:latest
  IMAGE_SERVER: ${{ secrets.DOCKERHUB_USERNAME }}/my-photographer-portfolio-app-server:latest

# ================================================================
# 1️⃣ TEST CLIENT
# ================================================================
jobs:
  test-client:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node + Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-photographer-portfolio-app/client/package-lock.json

      - name: Install deps
        working-directory: my-photographer-portfolio-app/client
        run: npm ci

      - name: Run test
        working-directory: my-photographer-portfolio-app/client
        run: npm test -- --watchAll=false --passWithNoTests

  # ================================================================
  # 2️⃣ TEST SERVER
  # ================================================================
  test-server:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node + Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-photographer-portfolio-app/server/package-lock.json

      - name: Install deps
        working-directory: my-photographer-portfolio-app/server
        run: npm ci

      - name: Run test
        working-directory: my-photographer-portfolio-app/server
        run: npm test -- --watchAll=false --passWithNoTests

  # ================================================================
  # 3️⃣ BUILD CLIENT
  # ================================================================
  build-client:
    runs-on: ubuntu-latest
    needs: test-client

    steps:
      - uses: actions/checkout@v4

      - name: Create env
        run: echo "${{ secrets.CLIENT_ENV }}" > my-photographer-portfolio-app/client/.env.production

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Client (with cache)
        uses: docker/build-push-action@v5
        with:
          context: ./my-photographer-portfolio-app/client
          file: ./my-photographer-portfolio-app/client/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_CLIENT }}
          cache-from: type=registry,ref=${{ env.IMAGE_CLIENT }}
          cache-to: type=inline

  # ================================================================
  # 4️⃣ BUILD SERVER
  # ================================================================
  build-server:
    runs-on: ubuntu-latest
    needs: test-server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Server (with cache)
        uses: docker/build-push-action@v5
        with:
          context: ./my-photographer-portfolio-app/server
          file: ./my-photographer-portfolio-app/server/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_SERVER }}
          cache-from: type=registry,ref=${{ env.IMAGE_SERVER }}
          cache-to: type=inline

  # ================================================================
  # 5️⃣ DEPLOY
  # ================================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [build-client, build-server]

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 60s
          debug: true
          script: |
            set -e

            cd /home/${{ secrets.VM_USER }}

            if [ ! -d "Photographer-Portfolio" ]; then
              git clone https://github.com/TTHai-Git/Photographer-Portfolio.git
            fi

            cd Photographer-Portfolio/my-photographer-portfolio-app
            git reset --hard
            git pull origin main

            echo "${{ secrets.SERVER_ENV }}" > server/.env.production
            echo "${{ secrets.CLIENT_ENV }}" > client/.env.production

            docker compose down
            docker pull ${{ env.IMAGE_CLIENT }}
            docker pull ${{ env.IMAGE_SERVER }}
            docker compose up -d --force-recreate
            docker image prune -f

  # ================================================================
  # 6️⃣ FINAL NOTIFY
  # ================================================================
  notify:
    runs-on: ubuntu-latest
    needs: [test-client, test-server, build-client, build-server, deploy]
    if: always()

    steps:
      - name: Notify Final
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            STATUS="🎉 ALL SUCCESS"
            COLOR=3066993
          else
            STATUS="💥 PIPELINE FAILED"
            COLOR=15158332
          fi

          curl -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"$STATUS\",
              \"color\": $COLOR,
              \"fields\": [
                {\"name\": \"🧪 Client Test\", \"value\": \"${{ needs.test-client.result }}\", \"inline\": true},
                {\"name\": \"🧪 Server Test\", \"value\": \"${{ needs.test-server.result }}\", \"inline\": true},
                {\"name\": \"🐳 Client Build\", \"value\": \"${{ needs.build-client.result }}\", \"inline\": true},
                {\"name\": \"🐳 Server Build\", \"value\": \"${{ needs.build-server.result }}\", \"inline\": true},
                {\"name\": \"🚀 Deploy\", \"value\": \"${{ needs.deploy.result }}\", \"inline\": true}
              ]
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}
